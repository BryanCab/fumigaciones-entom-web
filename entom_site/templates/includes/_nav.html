{% load static %}
{% url 'products:product_list' as products_url %}
{% url 'products:category_list' as categories_url %}
{% url 'services:service_list' as services_url %}
{% url 'home' as home_url %}

<nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top">
  <div class="container">

    <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="{{ home_url }}">
      <span class="d-inline-flex align-items-center justify-content-center p-1 me-2 rounded-3 bg-white shadow-sm" style="border:1px solid rgba(13,110,253,.18); min-width: 48px; min-height: 48px;">
        <img src="{% static 'core/images/logo.png' %}" alt="Fumigaciones Entom" height="38">
      </span>
      <span>Fumigaciones Entom</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item mx-lg-2">
          <a class="nav-link nav-link-custom {% if request.path == products_url or request.path|slice:':11' == '/productos/' %}active{% endif %}"
             href="{{ products_url }}">
            <i class="bi bi-box-seam me-1"></i> Productos
          </a>
        </li>

        <li class="nav-item mx-lg-2">
          <a class="nav-link nav-link-custom {% if request.path == categories_url or request.path|slice:':12' == '/categorias/' %}active{% endif %}"
             href="{{ categories_url }}">
            <i class="bi bi-tags me-1"></i> Categorías
          </a>
        </li>

        <li class="nav-item mx-lg-2">
          <a class="nav-link nav-link-custom {% if request.path == services_url or request.path|slice:':10' == '/servicios/' %}active{% endif %}"
             href="{{ services_url }}">
            <i class="bi bi-shield-check me-1"></i> Servicios
          </a>
        </li>

      </ul>
    </div>

  </div>
</nav>
